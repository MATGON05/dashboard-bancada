<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - SUIT-TECH</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="logo"><img src="logo.png" alt="SUIT-TECH"></span>
        <div>
          <h1>SUIT-TECH</h1>
          <small>Assistência Técnica</small>
        </div>
      </div>
      <nav>
        <a href="index.html" data-page="dashboard">Dashboard</a>
        <a href="clientes.html" class="active" data-page="clientes">Clientes</a>
        <a href="orcamentos.html" data-page="orcamentos">Orçamentos</a>
        <a href="caixa-entrada.html" data-page="caixa-entrada">Caixa Entrada</a>
        <a href="caixa-saida.html" data-page="caixa-saida">Caixa Saída</a>
        <a href="relatorios.html" data-page="relatorios">Relatórios</a>
        <a href="agendamentos.html" data-page="agendamentos">Agendamentos</a>
      </nav>
      <footer class="sidebar-footer">
        <span> rodando local</span>
      </footer>
    </aside>

    <main class="content">
      <header class="topbar">
        <h2>Clientes</h2>
        <button class="btn btn-primary" onclick="openClientModal()">+ Novo Cliente</button>
      </header>

      <section class="panel">
        <div class="toolbar">
          <input type="text" id="search-client" placeholder="Buscar cliente..." oninput="renderClients()">
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Telefone</th>
              <th>E-mail</th>
              <th>CPF</th>
              <th>Endereço</th>
              <th class="actions">Ações</th>
            </tr>
          </thead>
          <tbody id="clients-table">
            <tr><td colspan="6" class="empty">Carregando...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="client-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="client-modal-title">Novo Cliente</h3>
        <button class="close" onclick="closeClientModal()">&times;</button>
      </div>
      <form id="client-form" onsubmit="saveClient(event)">
        <input type="hidden" id="client-id">
        <div class="form-grid">
          <div class="form-group span-2">
            <label>Nome *</label>
            <input type="text" id="client-name" required>
          </div>
          <div class="form-group">
            <label>Telefone</label>
            <input type="text" id="client-phone">
          </div>
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="client-email">
          </div>
          <div class="form-group">
            <label>CPF</label>
            <input type="text" id="client-cpf">
          </div>
          <div class="form-group span-2">
            <label>Endereço</label>
            <input type="text" id="client-address">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn" onclick="closeClientModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', loadClients);
  </script>
</body>
</html>
