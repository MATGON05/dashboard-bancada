<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caixa Entrada - SUIT-TECH</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="logo"><img src="logo.png" alt="SUIT-TECH"></span>
        <div>
          <h1>SUIT-TECH</h1>
          <small>Assistência Técnica</small>
        </div>
      </div>
      <nav>
        <a href="index.html" data-page="dashboard">Dashboard</a>
        <a href="clientes.html" data-page="clientes">Clientes</a>
        <a href="orcamentos.html" data-page="orcamentos">Orçamentos</a>
        <a href="caixa-entrada.html" class="active" data-page="caixa-entrada">Caixa Entrada</a>
        <a href="caixa-saida.html" data-page="caixa-saida">Caixa Saída</a>
        <a href="relatorios.html" data-page="relatorios">Relatórios</a>
        <a href="agendamentos.html" data-page="agendamentos">Agendamentos</a>
      </nav>
      <footer class="sidebar-footer">
        <span>rodando local</span>
      </footer>
    </aside>

    <main class="content">
      <header class="topbar">
        <h2>Controle de Caixa - Entradas</h2>
        <button class="btn btn-primary" onclick="openCashInModal()">+ Nova Entrada</button>
      </header>

      <section class="panel">
        <div class="toolbar">
          <select id="filter-in-month" onchange="loadCashIn()">
            <option value="1">Janeiro</option>
            <option value="2">Fevereiro</option>
            <option value="3">Março</option>
            <option value="4">Abril</option>
            <option value="5">Maio</option>
            <option value="6">Junho</option>
            <option value="7">Julho</option>
            <option value="8">Agosto</option>
            <option value="9">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
          </select>
          <input type="number" id="filter-in-year" value="2026" onchange="loadCashIn()">
        </div>

        <div class="stats-grid">
          <div class="stat-card accent-gold">
            <span class="stat-label">Vendas</span>
            <strong class="stat-value" id="in-total-sales">R$ 0,00</strong>
          </div>
          <div class="stat-card accent-orange">
            <span class="stat-label">Custos</span>
            <strong class="stat-value" id="in-total-cost">R$ 0,00</strong>
          </div>
          <div class="stat-card accent-green">
            <span class="stat-label">Lucro</span>
            <strong class="stat-value" id="in-total-profit">R$ 0,00</strong>
          </div>
        </div>

        <div class="chart-wrapper" style="margin:20px 0; max-height:300px">
          <canvas id="cashInChart"></canvas>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Descrição</th>
              <th>Tipo</th>
              <th>Venda</th>
              <th>Custo</th>
              <th>Lucro</th>
              <th class="actions">Ações</th>
            </tr>
          </thead>
          <tbody id="cash-in-table">
            <tr><td colspan="7" class="empty">Carregando...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="cash-in-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="cash-in-modal-title">Nova Entrada</h3>
        <button class="close" onclick="closeCashInModal()">&times;</button>
      </div>
      <form id="cash-in-form" onsubmit="saveCashIn(event)">
        <input type="hidden" id="cash-in-id">
        <div class="form-grid">
          <div class="form-group">
            <label>Data *</label>
            <input type="date" id="cash-in-date" required>
          </div>
          <div class="form-group">
            <label>Tipo *</label>
            <select id="cash-in-type" required>
              <option>Serviço</option>
              <option>Produto</option>
            </select>
          </div>
          <div class="form-group span-2">
            <label>Descrição *</label>
            <input type="text" id="cash-in-description" required placeholder="Ex: Troca de tela iPhone 14">
          </div>
          <div class="form-group">
            <label>Valor da Venda (R$) *</label>
            <input type="number" step="0.01" id="cash-in-sale" required oninput="calcCashInProfit()">
          </div>
          <div class="form-group">
            <label>Custo (R$)</label>
            <input type="number" step="0.01" id="cash-in-cost" value="0" oninput="calcCashInProfit()">
          </div>
          <div class="form-group">
            <label>Lucro Calculado (R$)</label>
            <input type="text" id="cash-in-profit" readonly>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn" onclick="closeCashInModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('filter-in-month').value = String(new Date().getMonth() + 1);
      document.getElementById('filter-in-year').value = new Date().getFullYear();
      loadCashIn();
    });
  </script>
</body>
</html>
